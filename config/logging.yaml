version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: '%(asctime)s - [%(levelname)s] - %(name)s - %(message)s'
    datefmt: '%Y-%m-%d %H:%M:%S'
  
  detailed:
    format: '%(asctime)s - [%(levelname)s] - %(name)s:%(lineno)d - %(funcName)s() - %(message)s'
    datefmt: '%Y-%m-%d %H:%M:%S'

handlers:
  console:
    class: logging.StreamHandler
    level: DEBUG
    formatter: standard
    stream: ext://sys.stdout
  
  file:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: detailed
    filename: 'logs/cropsenseai.log'
    maxBytes: 10485760  # 10MB
    backupCount: 5
  
  error_file:
    class: logging.handlers.RotatingFileHandler
    level: ERROR
    formatter: detailed
    filename: 'logs/cropsenseai_errors.log'
    maxBytes: 10485760  # 10MB
    backupCount: 3

loggers:
  cropsenseai:
    level: DEBUG
    handlers: [console, file]
    propagate: false
  
  cropsenseai.crop_classification:
    level: DEBUG
    handlers: [console, file]
    propagate: false
  
  cropsenseai.stress_detection:
    level: DEBUG
    handlers: [console, file]
    propagate: false
  
  cropsenseai.irrigation_recommendation:
    level: DEBUG
    handlers: [console, file]
    propagate: false
  
  cropsenseai.dashboard:
    level: INFO
    handlers: [console, file]
    propagate: false

root:
  level: INFO
  handlers: [console, file, error_file]
